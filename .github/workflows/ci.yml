name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux ─────────────────────────────────────────────────────
  Ubuntu_gcc:
    uses: ./.github/workflows/build-linux.yml

  Ubuntu_clang:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++

  # ── macOS ─────────────────────────────────────────────────────
  macOS_Xcode164:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '16.4'
      runs-on: macos-latest
